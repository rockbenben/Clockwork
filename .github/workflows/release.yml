name: Release

# push 一个 v* 标签（如 v1.2.0）即触发：跑测试 → 发布自包含单文件 exe →
# 用标签号覆盖版本 → 打包成带版本号的 zip（Clockwork-<tag>.zip）→ 创建 GitHub Release 并附上该 zip。
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # 创建 Release 需要写权限

jobs:
  release:
    runs-on: windows-latest
    steps:
      # checkout@v7 / setup-dotnet@v6：底层 Node 24（LTS），消除旧版 Node 20 弃用警告。
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      # 标签 v1.2.0 → 版本 1.2.0（去掉前缀 v），注入 exe 让文件版本与标签一致。
      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # 发布前先跑测试，不让红的构建出 Release。
      - name: Test
        run: dotnet test app.Tests/Clockwork.Tests.csproj -c Release --verbosity normal

      - name: Publish single-file exe
        run: dotnet publish app/Clockwork.csproj -c Release -r win-x64 -p:Version=${{ steps.ver.outputs.version }} -o publish

      # 打包成带版本号的 zip：包名 Clockwork-<tag>.zip（如 Clockwork-v2.2.0.zip），内含 Clockwork.exe。
      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path publish/Clockwork.exe -DestinationPath "Clockwork-$env:GITHUB_REF_NAME.zip"

      # 用 runner 自带的 gh CLI + 内置 GITHUB_TOKEN，不引第三方 action。
      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" "Clockwork-${GITHUB_REF_NAME}.zip" --title "$GITHUB_REF_NAME" --generate-notes
